<svg width="900" height="580" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="580" fill="#F8F9FA" rx="8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Effira OPTi — Adresserbar marknad (SAM ~400 000 hushåll)</text>

  <!-- ============ CIRCLE A — split into A1 and A2 ============ -->
  <!-- Center: (160, 295), Radius: 88 -->
  <!-- A1: 75% = 270°, from top (-90°) clockwise to 180° -->
  <!-- A2: 25% = 90°,  from 180° clockwise back to top   -->
  <!-- Top of circle: (160, 207) -->
  <!-- A1 end at 180°: (72, 295) -->

  <!-- A1 segment -->
  <path d="M 160 295 L 160 207 A 88 88 0 1 1 72 295 Z"
        fill="#C5DCF0" stroke="white" stroke-width="2"/>

  <!-- A2 segment -->
  <path d="M 160 295 L 72 295 A 88 88 0 0 1 160 207 Z"
        fill="#D4C8A0" stroke="white" stroke-width="2"/>

  <!-- A outer ring -->
  <circle cx="160" cy="295" r="88" fill="none" stroke="#8aabcb" stroke-width="1.5"/>

  <!-- A1 label — midpoint at ~45° (lower right of A1) -->
  <text x="186" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4870">A1</text>
  <text x="186" y="337" text-anchor="middle" font-size="9" fill="#1a4870">Optimeraren</text>
  <text x="186" y="350" text-anchor="middle" font-size="9" fill="#2c5f8a">~10–13%</text>

  <!-- Dot representing sold units — inside A1 -->
  <circle cx="175" cy="268" r="6" fill="#C0392B" stroke="#922B21" stroke-width="1.5"/>
  <text x="175" y="260" text-anchor="middle" font-size="8" fill="#922B21">sålda enheter</text>

  <!-- A2 label — midpoint at ~225° (upper left) -->
  <text x="122" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b5a1a">A2</text>
  <text x="122" y="275" text-anchor="middle" font-size="9" fill="#6b5a1a">80-åringen</text>
  <text x="122" y="287" text-anchor="middle" font-size="9" fill="#6b5a1a">~3–5%</text>

  <!-- A sub-label -->
  <text x="160" y="415" text-anchor="middle" font-size="11" fill="#777">Segment A — Självdrivna</text>

  <!-- ============ CIRCLE B — PIE CHART ============ -->
  <!-- Center: (600, 295), Radius: 215 -->
  <!-- B1: 20% = 72°  | from top to -18°     -->
  <!-- B2: 35% = 126° | from -18° to 108°    -->
  <!-- B3: 45% = 162° | from 108° to 270°    -->

  <!-- B1 segment -->
  <path d="M 600 295 L 600 80 A 215 215 0 0 1 805 228 Z"
        fill="#F9C97A" stroke="white" stroke-width="3"/>

  <!-- B2 segment -->
  <path d="M 600 295 L 805 228 A 215 215 0 0 1 534 499 Z"
        fill="#82C9A5" stroke="white" stroke-width="3"/>

  <!-- B3 segment -->
  <path d="M 600 295 L 534 499 A 215 215 0 0 1 600 80 Z"
        fill="#9ABCE0" stroke="white" stroke-width="3"/>

  <!-- B outer ring -->
  <circle cx="600" cy="295" r="215" fill="none" stroke="#7a9ab8" stroke-width="2"/>

  <!-- B1 Label -->
  <text x="686" y="178" text-anchor="middle" font-size="16" font-weight="bold" fill="#7B4E0A">B1</text>
  <text x="686" y="196" text-anchor="middle" font-size="11" fill="#7B4E0A">Den Väckta</text>
  <text x="686" y="212" text-anchor="middle" font-size="10" fill="#7B4E0A">~15–20%</text>

  <!-- B2 Label -->
  <text x="710" y="395" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a5e3a">B2</text>
  <text x="710" y="413" text-anchor="middle" font-size="11" fill="#1a5e3a">Hushållsförvaltaren</text>
  <text x="710" y="429" text-anchor="middle" font-size="10" fill="#1a5e3a">~25–35%</text>

  <!-- B3 Label -->
  <text x="460" y="271" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3a6e">B3</text>
  <text x="460" y="289" text-anchor="middle" font-size="11" fill="#1a3a6e">Den Passiva</text>
  <text x="460" y="305" text-anchor="middle" font-size="11" fill="#1a3a6e">Villaägaren</text>
  <text x="460" y="321" text-anchor="middle" font-size="10" fill="#1a3a6e">~30–40%</text>

  <!-- B sub-label -->
  <text x="600" y="535" text-anchor="middle" font-size="11" fill="#777">Segment B — Köpare att nå aktivt</text>

  <!-- Footnote -->
  <text x="450" y="558" text-anchor="middle" font-size="10" fill="#aaa">Cirklar proportionella mot andel av SAM. ● = sålda enheter (illustrativ storlek).</text>

</svg>
